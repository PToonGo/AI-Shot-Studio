<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Safe guard: allow writing to window.fetch or globalThis.fetch to avoid read-only setter crashes in sandbox iframes
      (function() {
        try {
          var originalFetch = window.fetch;
          var shadowFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return shadowFetch;
            },
            set: function(val) {
              shadowFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to define fetch setter fallback:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
